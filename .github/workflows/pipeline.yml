name: ML Pipeline

on:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn mlflow dvc dvc-s3

      - name: Configure DVC remote
        env:
          USER: ${{ secrets.DAGSHUB_USERNAME }}
          TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote add -d origin https://dagshub.com/${USER}/mlops-ci-cd-pipeline.dvc || true
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${USER}
          dvc remote modify origin --local password ${TOKEN}

      - name: Pull data
        run: dvc pull

      - name: Train model
        run: python train.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts
          path: |
            model_info.txt
            mlruns/

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install mlflow pandas scikit-learn

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: pipeline-artifacts

      - name: Check threshold
        run: python check_threshold.py

      - name: Mock Docker Build
        if: success()
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
